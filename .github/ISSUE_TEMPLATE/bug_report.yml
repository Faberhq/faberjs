name: Bug Report
description: Report a bug or unexpected behavior in a /* package
title: '[bug] '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      description: Which /* package is affected?
      options:
        - '/core'
        - '/router'
        - '/orm'
        - '/http'
        - '/console'
        - '/queue'
        - '/events'
        - '/auth'
        - '/config'
        - '/validation'
        - '/cache'
        - '/testing'
        - 'create-faberjs'
        - 'Multiple / Unknown'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a model with...
        2. Call Model.find(id)
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime and package versions.
      value: |
        - Node.js version:
        - pnpm version:
        - /* version:
        - OS:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Paste any relevant error output.
      render: shell
